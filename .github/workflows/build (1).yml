# ==========================================================================
#  GitHub Actions — build IntelXeDriver.kext
#
#  Three jobs:
#    build-x86_64   — native Xcode clang on macos-13 (Intel)  ← real target
#    build-arm64    — native Xcode clang on macos-14 (M1)      ← compile check
#    build-osxcross — osxcross cross-build on ubuntu-22.04     ← Linux CI path
# ==========================================================================

name: Build IntelXeDriver.kext

on:
  push:
    paths:
      - 'IntelXeDriver.cpp'
      - 'IntelXeDriver.hpp'
      - 'Info.plist'
      - 'Makefile'
      - '.github/workflows/build.yml'
  pull_request:
  workflow_dispatch:

concurrency:
  group: kext-${{ github.ref }}
  cancel-in-progress: true

env:
  KEXT_NAME: IntelXeDriver
  BUNDLE_ID: com.intelxe.driver.IntelXeDriver

jobs:
  # ================================================================
  #  x86_64 build — Intel-based macOS (the actual target platform)
  # ================================================================
  build-x86_64:
    name: Build KEXT (x86_64)
    runs-on: macos-13
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode & show toolchain
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer 2>/dev/null || true
          echo "xcode-select path: $(xcode-select -p)"
          echo "SDK path:         $(xcrun --sdk macosx --show-sdk-path)"
          echo "clang:            $(xcrun --find clang++)"
          $(xcrun --find clang++) --version | head -1

      - name: Build KEXT
        run: make -j$(sysctl -n hw.ncpu)

      - name: Verify Mach-O
        run: |
          KEXT="build/${{ env.KEXT_NAME }}.kext/Contents/MacOS/${{ env.KEXT_NAME }}"
          file "$KEXT"
          echo "---"
          otool -hv "$KEXT"
          echo "---"
          echo "Bundle contents:"
          find "build/${{ env.KEXT_NAME }}.kext" -type f | sort

      - name: Validate Info.plist
        run: |
          PLIST="build/${{ env.KEXT_NAME }}.kext/Contents/Info.plist"
          plutil -lint "$PLIST"
          echo "--- IOPCIPrimaryMatch:"
          /usr/libexec/PlistBuddy \
            -c "Print :IOKitPersonalities:IntelIrisXeFramebuffer:IOPCIPrimaryMatch" \
            "$PLIST"

      - name: Upload KEXT artifact
        uses: actions/upload-artifact@v4
        with:
          name: IntelXeDriver-x86_64.kext
          path: build/${{ env.KEXT_NAME }}.kext
          if-no-files-found: error

  # ================================================================
  #  arm64 build — Apple Silicon (compile-check only)
  # ================================================================
  build-arm64:
    name: Build KEXT (arm64 — compile check)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode & show toolchain
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer 2>/dev/null || true
          echo "xcode-select path: $(xcode-select -p)"
          echo "SDK path:         $(xcrun --sdk macosx --show-sdk-path)"
          echo "clang:            $(xcrun --find clang++)"
          $(xcrun --find clang++) --version | head -1

      - name: Build (arm64)
        run: |
          make ARCH=arm64 \
               BUILD_DIR=build-arm64 \
               KEXT_BUNDLE=build-arm64/${{ env.KEXT_NAME }}.kext \
               EXECUTABLE=build-arm64/${{ env.KEXT_NAME }}.kext/Contents/MacOS/${{ env.KEXT_NAME }}

      - name: Verify Mach-O
        run: |
          KEXT="build-arm64/${{ env.KEXT_NAME }}.kext/Contents/MacOS/${{ env.KEXT_NAME }}"
          file "$KEXT"
          otool -hv "$KEXT" 2>/dev/null || true

      - name: Upload arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: IntelXeDriver-arm64.kext
          path: build-arm64/${{ env.KEXT_NAME }}.kext
          if-no-files-found: error

  # ================================================================
  #  osxcross cross-build on Ubuntu
  # ================================================================
  build-osxcross:
    name: Cross-build (osxcross / Linux)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install osxcross dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            clang cmake git libxml2-dev libssl-dev \
            zlib1g-dev libbz2-dev liblzma-dev \
            python3 libz3-dev patchelf cpio

      - name: Build osxcross
        run: |
          git clone --depth 1 https://github.com/tpoechtrager/osxcross.git /opt/osxcross
          cd /opt/osxcross

          mkdir -p tarballs
          curl -sL -o tarballs/MacOSX13.3.sdk.tar.xz \
            "https://github.com/JinmoNoh/MacOSX-SDKs/releases/download/13.3/MacOSX13.3.sdk.tar.xz"

          export TARGET=x86_64-apple-darwin22
          export UNATTENDED=1
          ./build.sh 2>&1 | tail -20

          echo "=== osxcross ready ==="
          /opt/osxcross/target/bin/x86_64-apple-darwin22-clang++ --version | head -1

      - name: Cross-compile KEXT
        run: |
          export PATH="/opt/osxcross/target/bin:$PATH"
          cd "$GITHUB_WORKSPACE"

          make CROSS_CXX=x86_64-apple-darwin22-clang++ \
               ARCH=x86_64 \
               BUILD_DIR=build-osxcross \
               KEXT_BUNDLE=build-osxcross/${{ env.KEXT_NAME }}.kext \
               EXECUTABLE=build-osxcross/${{ env.KEXT_NAME }}.kext/Contents/MacOS/${{ env.KEXT_NAME }}

      - name: Verify Mach-O
        run: |
          KEXT="build-osxcross/${{ env.KEXT_NAME }}.kext/Contents/MacOS/${{ env.KEXT_NAME }}"
          file "$KEXT"
          python3 -c "
          import struct
          with open('$KEXT', 'rb') as f:
              magic = f.read(4)
              print(f'Mach-O magic: {magic.hex()}  (expect feedfacf = 64-bit LE)')
              hdr = f.read(24)
              cputype  = struct.unpack('<I', hdr[0:4])[0]
              cpusub   = struct.unpack('<I', hdr[4:8])[0]
              filetype = struct.unpack('<I', hdr[8:12])[0]
              print(f'CPU type:   {cputype}   (7 = x86_64)')
              print(f'CPU sub:    {cpusub}    (3 = CPU_SUBTYPE_X86_ALL)')
              print(f'Filetype:   0x{filetype:08X}  (0xFFFFFFFB = MH_KEXT_BUNDLE)')
          "

      - name: Upload osxcross artifact
        uses: actions/upload-artifact@v4
        with:
          name: IntelXeDriver-osxcross-x86_64.kext
          path: build-osxcross/${{ env.KEXT_NAME }}.kext
          if-no-files-found: error