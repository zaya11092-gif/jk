# ==========================================================================
#  GitHub Actions — build IntelXeDriver.kext on macOS runners
#
#  Two jobs:
#    build          — compiles the KEXT with Xcode clang on macos-13 (x86_64)
#    build-arm64    — compiles for Apple Silicon (macos-14 M1 runner)
# ==========================================================================

name: Build IntelXeDriver.kext

on:
  push:
    paths:
      - 'IntelXeDriver.cpp'
      - 'IntelXeDriver.hpp'
      - 'Info.plist'
      - 'Makefile'
      - '.github/workflows/build.yml'
  pull_request:
  workflow_dispatch:          # allows manual "Run workflow" button

concurrency:
  group: kext-${{ github.ref }}
  cancel-in-progress: true

env:
  KEXT_NAME: IntelXeDriver
  BUNDLE_ID: com.intelxe.driver.IntelXeDriver

jobs:
  # ================================================================
  #  x86_64 build — Intel-based macOS (the actual target platform)
  # ================================================================
  build-x86_64:
    name: Build KEXT (x86_64)
    runs-on: macos-13            # last Intel runner in GitHub Actions
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Xcode toolchain
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer 2>/dev/null || true
          xcode-select -p
          clang --version | head -1

      - name: Build KEXT
        run: make -j$(sysctl -n hw.ncpu)

      - name: Verify Mach-O
        run: |
          file build/${{ env.KEXT_NAME }}.kext/Contents/MacOS/${{ env.KEXT_NAME }}
          otool -hv build/${{ env.KEXT_NAME }}.kext/Contents/MacOS/${{ env.KEXT_NAME }}
          echo "---"
          echo "Bundle contents:"
          find build/${{ env.KEXT_NAME }}.kext -type f | sort

      - name: Validate Info.plist
        run: |
          plutil -lint build/${{ env.KEXT_NAME }}.kext/Contents/Info.plist
          echo "---"
          echo "IOPCIPrimaryMatch:"
          /usr/libexec/PlistBuddy -c "Print :IOKitPersonalities:IntelIrisXeFramebuffer:IOPCIPrimaryMatch" \
            build/${{ env.KEXT_NAME }}.kext/Contents/Info.plist

      - name: Upload KEXT artifact
        uses: actions/upload-artifact@v4
        with:
          name: IntelXeDriver-x86_64.kext
          path: build/${{ env.KEXT_NAME }}.kext
          if-no-files-found: error

  # ================================================================
  #  arm64 build — Apple Silicon (compile-check only)
  # ================================================================
  build-arm64:
    name: Build KEXT (arm64 — compile check)
    runs-on: macos-14                # Apple M1 runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (arm64 compile check)
        run: |
          # Override ARCH for arm64
          make ARCH=arm64 \
               CXXFLAGS_EXTRA="-target arm64-apple-macos13.0" \
               LDFLAGS_EXTRA="-target arm64-apple-macos13.0" \
               KEXT_BUNDLE=build-arm64/${{ env.KEXT_NAME }}.kext \
               EXECUTABLE=build-arm64/${{ env.KEXT_NAME }}.kext/Contents/MacOS/${{ env.KEXT_NAME }} \
               BUILD_DIR=build-arm64

      - name: Verify Mach-O
        run: |
          file build-arm64/${{ env.KEXT_NAME }}.kext/Contents/MacOS/${{ env.KEXT_NAME }}

      - name: Upload arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: IntelXeDriver-arm64.kext
          path: build-arm64/${{ env.KEXT_NAME }}.kext
          if-no-files-found: error

  # ================================================================
  #  osxcross cross-build on Ubuntu (optional — proves Linux CI path)
  # ================================================================
  build-osxcross:
    name: Cross-build (osxcross / Linux)
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/cross-rs/x86_64-unknown-linux-gnu:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install osxcross dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends \
            clang cmake git libxml2-dev libssl-dev \
            zlib1g-dev libbz2-dev liblzma-dev \
            python3 libz3-dev patchelf  cpio
          echo "=== deps installed ==="

      - name: Build osxcross
        run: |
          git clone --depth 1 https://github.com/tpoechtrager/osxcross.git /opt/osxcross
          cd /opt/osxcross

          # Download macOS 13 SDK (Ventura — last x86_64-full SDK)
          OSDIR="/opt/osxcross/tarballs"
          mkdir -p "$OSDIR"
          curl -sL -o "$OSDIR/MacOSX13.3.sdk.tar.xz" \
            "https://github.com/JinmoNoh/MacOSX-SDKs/releases/download/13.3/MacOSX13.3.sdk.tar.xz"

          # Build osxcross (target x86_64 only for speed)
          export TARGET=x86_64-apple-darwin22
          export UNATTENDED=1
          ./build.sh 2>&1 | tail -20

          echo "=== osxcross built ==="
          /opt/osxcross/target/bin/x86_64-apple-darwin22-clang++ --version

      - name: Cross-compile KEXT
        run: |
          export PATH="/opt/osxcross/target/bin:$PATH"
          cd $GITHUB_WORKSPACE

          # Use osxcross clang
          make CC=x86_64-apple-darwin22-clang++ \
               ARCH=x86_64 \
               KEXT_BUNDLE=build-osxcross/${{ env.KEXT_NAME }}.kext \
               EXECUTABLE=build-osxcross/${{ env.KEXT_NAME }}.kext/Contents/MacOS/${{ env.KEXT_NAME }} \
               BUILD_DIR=build-osxcross

      - name: Verify Mach-O
        run: |
          # otool isn't available on Linux, use file(1) + python3
          file build-osxcross/${{ env.KEXT_NAME }}.kext/Contents/MacOS/${{ env.KEXT_NAME }}
          python3 -c "
          import struct
          with open('build-osxcross/${{ env.KEXT_NAME }}.kext/Contents/MacOS/${{ env.KEXT_NAME }}', 'rb') as f:
              magic = f.read(4)
              print(f'Mach-O magic: {magic.hex()} (expect feedface for 64-bit)')
              f.seek(0)
              hdr = f.read(4+24)  # mach_header_64 up to filetype
              if len(hdr) >= 12:
                  filetype = struct.unpack('<I', hdr[12:16])[0]
                  print(f'Filetype: 0x{filetype:08X} (expect 0xFFFFFFFB = MH_KEXT_BUNDLE)')
              cputype = struct.unpack('<I', hdr[4:8])[0]
              cpusub = struct.unpack('<I', hdr[8:12])[0]
              print(f'CPU type: {cputype} (7 = x86_64)')
              print(f'CPU sub:  {cpusub} (3 = CPU_SUBTYPE_X86_ALL)')
          "

      - name: Upload osxcross artifact
        uses: actions/upload-artifact@v4
        with:
          name: IntelXeDriver-osxcross-x86_64.kext
          path: build-osxcross/${{ env.KEXT_NAME }}.kext
          if-no-files-found: error